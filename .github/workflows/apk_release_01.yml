name: apk_release

on: push

permissions:
  contents: write

jobs:
  build_apk_release:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: setup flutter
        uses: subosito/flutter-action@v2

      - name: pub get
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Verify keystore
        run: |
          keytool -list -v \
            -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Verify key access
        run: |
          keytool -keypasswd \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build Apk
        run: flutter build apk --release --build-name=0.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      - name: make the release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'build/app/outputs/flutter-apk/app-release.apk'
          tag: v0.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}